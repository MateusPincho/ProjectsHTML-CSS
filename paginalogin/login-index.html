<!DOCTYPE html>
<html>
   <head>
        <meta charset="UTF-8" />
        <meta id="viewport" name="viewport" content="width=device-width, user-scalable=no"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
        <title>Página de Login</title> 
        <link rel="stylesheet" type="text/css" href="assets/css/login-style.css"> 
   </head>

   <body>
        <header>
            <div class="container">
                <div class="logo">
                    <a href="">LOGO DO SITE</a>
                </div>

                <div class="menu">
                    <ul>
                        <li><a href="">Fazer Login</a></li>
                        <li><a href="">Fazer Cadastro</a></li>
                    </ul>
                </div>
            </div>
        </header>
        <section id="geral">
           <div class="container">
               <section>
                    <div class="formulario">
                        <div class="formtitle">
                            <h1>
                                Faça seu Cadastro!
                            </h1>
                        </br>
                            <h2>
                                Bem vindo! Preencha as informações abaixo e usufrua de todos os nossos recursos.
                            </h2>
                        </div>
                        <div class="formbody">
                            <form>
                                <input type="text" name="nome" placeholder="Nome Completo" />
                                <input type="text" name="apelido" placeholder="Apelido" />
                                <input type="email" name="email" placeholder="Seu Melhor Email" />
                                <input type="password" name="senha" placeholder="Senha" />
                             </form>

                             <button> Fazer Cadastro</button>
                        </div>
                    </div>
               </section>
               <aside>
                   <div class="imgaside">
                       <img src="assets/images/imglogin.png" alt="computador">
                   </div>
               </aside>
           </div>
        </section>
        <footer>
            <div class="container">
                    <h1>
                        @ Todos os direitos reservados - By mateuspincho 2021
                    </h1>
            </div>  
        </footer>

   </body>



</html>
